name: Lint and Test Charts

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
      - "charts/pihole/examples/**"

permissions:
  contents: read

jobs:

  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.17.1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --check-version-increment=false --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }}

  kube-linter:
    name: Lint manifests (kube-linter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run kube-linter
        uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1
        with:
          directory: charts/pihole
          config: charts/pihole/.kube-linter.yaml

  kubeconform:
    name: Validate rendered manifests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ["1.23.0", "1.27.0", "1.31.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.17.1

      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Render and validate against Kubernetes ${{ matrix.k8s-version }}
        run: |
          crd='https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          validate() {
            kubeconform -strict -summary \
              -kubernetes-version "${{ matrix.k8s-version }}" \
              -schema-location default \
              -schema-location "$crd"
          }
          echo "== default values =="
          helm template pihole charts/pihole | validate
          for f in dhcp-values k3s-values metallb-values; do
            echo "== examples/$f.yaml =="
            helm template pihole charts/pihole -f "charts/pihole/examples/$f.yaml" | validate
          done
          echo "== ci/monitoring-values.yaml =="
          helm template pihole charts/pihole -f charts/pihole/ci/monitoring-values.yaml | validate
          echo "== podMonitor enabled =="
          helm template pihole charts/pihole --set monitoring.podMonitor.enabled=true | validate

